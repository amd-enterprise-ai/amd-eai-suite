repos:
  - repo: local
    hooks:
      - id: ai-rules-sync
        name: AI Rules Sync
        description: Ensure CLAUDE.md symlinks and generated files are up to date
        entry: make ai-rules
        language: system
        files: ^(.*AI_RULES\.md|.*CLAUDE\.md)$
        pass_filenames: false
      - id: copyright-check
        name: AMD Copyright Check
        description: Check that all files have the required AMD copyright
        entry: tooling/check_copyright.py --fix
        language: python
        pass_filenames: true
        always_run: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(apps/api/workloads_manager/workloads_manager/data/patches|packages/workloads_manager/workloads_manager/data/patches)
      - id: end-of-file-fixer
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
        args: ["--write", "--config", ".prettierrc"]
        exclude: ^(apps/ui|docs|helm/.*.yaml|.github/workflows/.*.yml|apps/api/.*/specs/test_workloads)
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.2.6
    hooks:
      - id: biome-format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        additional_dependencies:
          [
            types-redis,
            types-PyYAML,
            types-requests,
            types-tabulate,
            types-docker,
          ]
        args: ["--config-file=pyproject.toml"]
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]
  - repo: local
    hooks:
      - id: airm-ui-typecheck
        name: AIRM UI typecheck
        entry: >
          bash -c 'pnpm --dir apps/ui/airm typecheck &&
          pnpm --dir apps/ui/aiwb typecheck'
        language: system
        pass_filenames: false
        files: ^apps/ui/airm/.*$|^apps/ui/aiwb/.*$
      - id: airm-ui-lint
        name: AIRM UI lint
        entry: >
          bash -c 'pnpm --dir apps/ui/airm lint &&
          pnpm --dir apps/ui/aiwb lint'
        language: system
        pass_filenames: false
        files: ^apps/ui/airm/.*$|^apps/ui/aiwb/.*$
      - id: airm-agent-format
        name: AIRM Agent format
        entry: apps/agent/.pre-commit-gofmt.sh
        language: script
        pass_filenames: false
        files: ^apps/agent/.*\.go$
        stages: [pre-commit, pre-push]
      - id: airm-agent-lint
        name: AIRM Agent lint
        entry: bash -c 'cd apps/agent && make lint > /dev/null 2>&1 || (make lint && exit 1)'
        language: system
        pass_filenames: false
        files: ^apps/agent/.*\.go$
        stages: [pre-commit, pre-push]
      - id: shellcheck-with-message
        name: shellcheck with fixer message
        description: Run shellcheck and suggest using the fixer when issues are found
        language: python
        entry: tooling/shellcheck/shellcheck_with_message.py
        types: [shell]
        pass_filenames: true
        additional_dependencies: ["shellcheck-py==0.9.0.6"]
      - id: shellcheck-fixer
        name: Fix common ShellCheck issues
        description: Automatically fixes common ShellCheck issues in shell scripts
        entry: tooling/shellcheck/shellcheck_fixer_wrapper.py
        language: python
        types: [shell]
        stages: [manual]
        pass_filenames: true
        always_run: false
        verbose: true
      - id: plantuml
        name: UML diagram rendering
        description: Renders plantuml diagrams (*.puml) into pngs
        entry: tooling/plantuml/.pre-commit-plantuml.sh
        language: script
        types:
          - text
      - id: airm-ui-test-coverage
        name: AIRM UI test coverage
        entry: >
          bash -c 'pnpm --dir apps/ui/airm test -- --coverage --bail=1 &&
          pnpm --dir apps/ui/aiwb test -- --coverage --bail=1'
        language: system
        pass_filenames: false
        files: ^apps/ui/airm/.*$|^apps/ui/aiwb/.*$
        stages: [pre-push]
        verbose: true
        fail_fast: true
      - id: airm-api-test
        name: AIRM API tests
        entry: bash -c 'cd apps/api/airm && uv run pytest -x'
        language: system
        pass_filenames: false
        files: ^apps/api/airm/.*$
        stages: [pre-push]
        verbose: true
        fail_fast: true
      - id: airm-agent-test
        name: AIRM Agent tests
        entry: bash -c 'cd apps/agent && make test > /dev/null 2>&1 || (make test && exit 1)'
        language: system
        pass_filenames: false
        files: ^apps/agent/.*\.go$
        stages: [pre-commit, pre-push]
        fail_fast: true
      - id: robot-dryrun
        name: Robot Framework dry-run validation
        description: Validates keyword names, arguments, imports, and syntax without executing tests
        entry: tooling/robot_dryrun.sh
        language: script
        pass_filenames: false
        files: ^(apps/api/aiwb/specs|apps/ui/aiwb/specs|apps/api/airm/specs)/.*\.(robot|resource|py|txt|csv)$
        stages: [pre-push]
        verbose: true
      - id: spectral
        name: AIRM API OpenAPI Spectral
        description: Lint OpenAPI spec with Spectral (run manually with pre-commit run spectral --hook-stage manual)
        entry: tooling/spectral/run_spectral.sh apps/api/airm
        language: script
        pass_filenames: false
        files: ^apps/api/airm/.*$
        stages: [manual]
        verbose: true
