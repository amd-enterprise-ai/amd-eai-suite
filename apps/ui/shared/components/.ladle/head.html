<!-- Polyfill process for next-auth and other Node-style deps in the browser (Ladle/Vite) -->
<script>
  (function(){
    var p = { env: { NODE_ENV: 'development' } };
    if (typeof globalThis !== 'undefined') globalThis.process = p;
    if (typeof window !== 'undefined') window.process = p;
  })();
</script>
